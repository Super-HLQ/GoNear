/** Haversine公式计算两点间距离（返回公里数） */
const calcDistance = (lat1, lng1, lat2, lng2) => {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
};

  const weekDays = ['日','一','二','三','四','五','六'];
  const w = weekDays[date.getWeekDay ? date.getWeekDay() : date.getDay()];
  return `${y}年${m}月${day}日 星期${w}`;
};

  const dLat = city.lat - MOCK_PLACES_CENTER.lat;
  const dLng = city.lng - MOCK_PLACES_CENTER.lng;
  return places.map(p => {
    const newLat = +(p.lat + dLat).toFixed(5);
    const newLng = +(p.lng + dLng).toFixed(5);
    return {
      ...p,
      lat: isNaN(newLat) ? p.lat : newLat,
      lng: isNaN(newLng) ? p.lng : newLng,
      name: p.name.replace(/深圳/g, city.name || ''),
    };
  });

    return x - Math.floor(x);

/**
 * 从 Supabase 查询附近真实用户
 * 筛选当前用户位置 5km 范围内的在线用户
 */
const fetchNearbyUsers = async (lat, lng) => {
  const sb = getSupabase();
  if (!sb || !lat || !lng) return null; // null 表示未配置 Supabase

  const range = 0.1; // ~11km 粗略范围（后续精确过滤）
  try {
    const { data, error } = await sb
      .from('nearby_users')
      .select('*')
      .gte('lat', lat - range)
      .lte('lat', lat + range)
      .gte('lng', lng - range)
      .lte('lng', lng + range)
      .limit(50);

    if (error) {
      console.error('[Supabase] 查询附近用户失败:', error.message);
      return null;
    }

    if (!data || data.length === 0) return [];

    return data.map(u => {
      const distance = calcDistance(lat, lng, u.lat, u.lng);
      const minutesAgo = u.last_seen
        ? Math.round((Date.now() - new Date(u.last_seen).getTime()) / 60000)
        : 999;
      return {
        ...u,
        distance,
        distanceText: formatDistance(distance),
        online: minutesAgo < 5,
        lastSeen: minutesAgo < 1 ? '刚刚在线'
          : minutesAgo < 60 ? `${minutesAgo}分钟前`
          : minutesAgo < 1440 ? `${Math.round(minutesAgo / 60)}小时前`
          : `${Math.round(minutesAgo / 1440)}天前`,
      };
    }).filter(u => u.distance <= 5).slice(0, 30); // 5km 精确过滤
  } catch (e) {
    console.error('[Supabase] fetchNearbyUsers 异常:', e.message);
    return null;
  }
};

/**
 * 同步当前用户档案到 Supabase
 */
const syncUserProfile = async (user, lat, lng) => {
  const sb = getSupabase();
  if (!sb || !user || !user.id || !lat || !lng) return;
  try {
    const { error } = await sb
      .from('nearby_users')
      .upsert({
        id: user.id,
        name: user.name || '邻居',
        avatar: user.avatar || '👤',
        intro: user.intro || '',
        color: user.color || '#4A90D9',
        lat,
        lng,
        last_seen: new Date().toISOString(),
      }, { onConflict: 'id' });

    if (error) console.error('[Supabase] 同步用户失败:', error.message);
  } catch (e) {
    console.error('[Supabase] syncUserProfile 异常:', e.message);
  }
};

/** 动态综合评分算法 */
function calculateDynamicScore(place, weather, aqi, hour) {
  let baseScore = place.rating;
  const isOutdoor = place.type === 'park' || place.type === 'sport';
  const isIndoor = place.type === 'indoor';

  // 天气因素
  if (weather.type === 'sunny' && isOutdoor) baseScore += 0.5;
  if (weather.type === 'rain' && isIndoor) baseScore += 0.5;

  // AQI因素
  if (aqi < 50 && isOutdoor) baseScore += 0.3;
  if (aqi > 100) baseScore -= 0.2;

  // 时间因素
  if (hour >= 6 && hour <= 20) {
    if (isOutdoor) baseScore += 0.2;
  } else {
    if (isOutdoor) baseScore -= 0.5;
  }

  return Math.max(1.0, Math.min(5.0, +baseScore.toFixed(1)));
}

/** 获取推荐理由 */
function getRecommendReason(place, weather, aqi, hour) {
  const reasons = [];
  if (hour >= 20 && (place.type === 'park' || place.type === 'sport')) {
    reasons.push('天色已晚，注意安全');
  }
  if (weather.type === 'sunny' && (place.type === 'park' || place.type === 'sport')) {
    reasons.push('天气晴朗，适合户外活动');
  }
  if (weather.type === 'rain' && place.type === 'indoor') {
    reasons.push('雨天最适合室内活动啦');
  }
  if (aqi < 50) {
    reasons.push('空气清新，深呼吸吧');
  }
  if (aqi > 100) {
    reasons.push('空气质量一般，减少剧烈运动');
  }
  if (hour >= 6 && hour < 10) {
    reasons.push('早晨好时光，出来走走吧');
  }
  if (hour >= 10 && hour < 14) {
    reasons.push('中午时段，注意防晒');
  }
  if (hour >= 14 && hour < 18) {
    reasons.push('下午好时光，约上朋友');
  }
  if (hour >= 18 && hour < 20) {
    reasons.push('傍晚凉快，正是出门时');
  }
  if (reasons.length === 0) {
    reasons.push('随时可以去的好地方');
  }
  return reasons.join(' · ');
}

// 通过 JSONP 调用高德周边搜索 API
function amapSearchNearby(lat, lng, radius, searchType) {
  return new Promise((resolve, reject) => {
    const callbackName = 'amap_cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    const url = `https://restapi.amap.com/v3/place/around?key=${AMAP_KEY}&location=${lng},${lat}&radius=${radius}&types=${encodeURIComponent(searchType)}&offset=25&page=1&extensions=all&output=json&callback=${callbackName}`;

    window[callbackName] = function(data) {
      delete window[callbackName];
      const script = document.getElementById(callbackName);
      if (script) script.remove();
      if (data && data.status === '1' && data.pois) {
        resolve(data.pois);
      } else {
        const errMsg = data && data.info ? data.info : ('status=' + (data ? data.status : 'null'));
        console.warn(`[AMAP] 搜索返回异常 lat=${lat}, lng=${lng}, type=${searchType}: ${errMsg}`);
        reject(new Error(errMsg));
      }
    };

    const script = document.createElement('script');
    script.id = callbackName;
    script.src = url;
    script.onerror = () => {
      delete window[callbackName];
      script.remove();
      reject(new Error('网络请求失败'));
    };
    document.head.appendChild(script);
  });
}

  const allPois = [];

  const promises = AMAP_SEARCH_TYPES.map(async (type) => {
    try {
      const pois = await amapSearchNearby(lat, lng, radius, type);

    } catch (e) {
      console.error(`[AMAP] 类型 ${type}: 搜索失败 -`, e.message || e);
      errors.push({ type, msg: e.message || '未知错误' });
      return [];
    }
  });

  const results = await Promise.all(promises);
  
  // 如果所有类型都失败了，抛出汇总错误
  if (errors.length === AMAP_SEARCH_TYPES.length) {
    const msg = errors.map(e => `${e.type}: ${e.msg}`).join('; ');
    throw new Error(`所有类型搜索均失败: ${msg}`);
  }

  const seen = new Set();
  results.flat().forEach(poi => {
    if (!seen.has(poi.id) && allPois.length < 40) {
      seen.add(poi.id);
      allPois.push(poi);
    }
  });

  console.log(`[AMAP] 总计合并 ${allPois.length} 个不重复 POI，${errors.length}/${AMAP_SEARCH_TYPES.length} 类型失败`);
  return allPois;
}

// 将高德 POI 转换为应用地点格式
function convertAmapPoiToPlace(poi, userLat, userLng) {
  const type = poi.type || '';
  let category = 'secret';
  let catIcon = 'fa-star';
  let catLabel = '秘密基地';
  for (const [key, val] of Object.entries(AMAP_TYPE_MAP)) {
    if (type.includes(key)) {
      category = val.category;
      catIcon = val.icon;
      catLabel = val.label;
      break;
    }
  }
  // 根据大类细分
  if (type.includes('体育') || type.includes('运动') || type.includes('健身') || type.includes('篮球') || type.includes('足球') || type.includes('游泳')) {
    category = 'sport'; catIcon = 'fa-basketball'; catLabel = '运动场地';
  } else if (type.includes('公园') || type.includes('风景') || type.includes('绿地') || type.includes('广场')) {
    category = 'park'; catIcon = 'fa-tree'; catLabel = '公园绿地';
  } else if (type.includes('文化') || type.includes('图书') || type.includes('博物馆') || type.includes('购物') || type.includes('餐饮')) {
    category = 'indoor'; catIcon = 'fa-building'; catLabel = '室内场所';
  }

  // 计算距离
  const dLat = (parseFloat(poi.location.split(',')[1]) - userLat) * 111320;
  const dLng = (parseFloat(poi.location.split(',')[0]) - userLng) * Math.cos(userLat * Math.PI / 180) * 111320;
  const distance = Math.round(Math.sqrt(dLat * dLat + dLng * dLng) / 10) / 100;

  const [lng, lat] = poi.location.split(',').map(Number);
  const rating = +(poi.biz_ext && poi.biz_ext.rating ? parseFloat(poi.biz_ext.rating) : (3.5 + Math.random() * 1.5)).toFixed(1);

  // 生成友好的标签（从 POI 类型中提取关键词，结合分类）
  const friendlyTags = generateFriendlyTags(type, category, poi);
  // 生成描述文本
  const desc = generatePlaceDesc(poi, category, catLabel, distance);

  return {
    id: 'amap_' + poi.id,
    name: poi.name,
    address: poi.address || '',
    category: category,
    type: category === 'sport' ? 'sport' : category === 'park' ? 'park' : 'indoor',
    lat: lat,
    lng: lng,
    rating: rating,
    distance: distance,
    tags: friendlyTags,
    desc: desc,
    source: 'amap',
    tel: poi.tel || '',
    photos: poi.photos || [],
  };
}

// 从 POI 类型中提取友好标签
function generateFriendlyTags(typeStr, category, poi) {
  const tags = [];
  // 分类标签
  const categoryTagMap = {
    'sport': ['运动', '健身', '户外'],
    'park': ['自然', '休闲', '散步'],
    'indoor': ['室内', '舒适', '便利'],
    'secret': ['隐藏', '小众', '特色'],
  };

  // 关键词匹配
  const keywordMap = {
    '篮球': '篮球', '足球': '足球', '游泳': '游泳', '羽毛球': '羽毛球',
    '网球': '网球', '跑步': '跑步', '健身': '健身', '瑜伽': '瑜伽',
    '公园': '公园', '花园': '花园', '绿道': '绿道', '草坪': '草坪',
    '图书': '阅读', '博物馆': '博物馆', '展览': '展览', '科技': '科技',
    '咖啡': '咖啡', '茶': '茶饮', '美食': '美食', '小吃': '小吃',
    '火锅': '火锅', '烧烤': '烧烤', '日料': '日料', '面馆': '面食',
    '商场': '购物', '超市': '便利', '影院': '电影', 'KTV': 'KTV',
    '河景': '河景', '湖景': '湖景', '海景': '海景', '山景': '山景',
    '儿童': '亲子', '宠物': '宠物', '免费': '免费', '24小时': '全天',
  };

  for (const [keyword, tag] of Object.entries(keywordMap)) {
    if (typeStr.includes(keyword) || (poi.name && poi.name.includes(keyword))) {
      if (!tags.includes(tag)) tags.push(tag);
    }
  }

  // 如果没有匹配到任何标签，使用分类默认标签
  if (tags.length === 0) {
    const defaults = categoryTagMap[category] || ['休闲', '探索'];
    tags.push(...defaults.slice(0, 3));
  }

  // 补充分类标签使标签更丰富（最多3个）
  const catDefaults = categoryTagMap[category] || [];
  for (const t of catDefaults) {
    if (tags.length >= 3) break;
    if (!tags.includes(t)) tags.push(t);
  }

  return tags.slice(0, 3);
}

// 生成地点描述
function generatePlaceDesc(poi, category, catLabel, distance) {
  const addr = poi.address || '';
  const name = poi.name || '';
  const typeStr = poi.type || '';

  // 根据分类生成合适的描述
  const descTemplates = {
    'sport': [
      `位于${addr.split('号')[0] || addr.slice(0, 8)}附近的运动好去处，适合日常锻炼和周末放松。设施完善，环境舒适。`,
      `${name}是周边居民运动健身的热门选择，场地条件优越，交通便利，距离仅${distance.toFixed(1)}公里。`,
      `一处深受欢迎的运动场所，${name}提供优质的运动体验，是释放压力、保持健康的好地方。`,
    ],
    'park': [
      `${name}是城市中的一片绿洲，环境优美，空气清新，适合散步、野餐和亲子活动。距离你约${distance.toFixed(1)}公里。`,
      `位于${addr.slice(0, 10)}附近，${name}风景宜人，是周末休闲放松的绝佳去处，也是摄影爱好者的打卡胜地。`,
      `${name}拥有优美的自然景观和舒适的休憩空间，无论是晨跑还是傍晚散步都非常合适。`,
    ],
    'indoor': [
      `${name}位于${addr.slice(0, 10)}，环境舒适，设施齐全，是购物休闲、文化体验的好去处，距离仅${distance.toFixed(1)}公里。`,
      `${name}是附近居民常去的室内场所，${typeStr.includes('餐饮') ? '美食丰富，口味多样，' : ''}交通便利，体验不错。`,
      `一处品质不错的${catLabel}，${name}提供了舒适的环境和便捷的服务，值得一去。`,
    ],
    'secret': [
      `${name}是藏在${addr.slice(0, 8)}附近的一个小众好去处，知道的人不多，但体验很棒，值得探索。`,
      `${name}是一处鲜为人知的${catLabel}，环境独特，氛围好，是发现城市另一面的好地方。`,
      `隐秘而有趣的${name}，距离仅${distance.toFixed(1)}公里，适合喜欢探索和尝试新事物的你。`,
    ],
  };

  const templates = descTemplates[category] || descTemplates['secret'];
  // 用 POI 名称的 hashCode 来选择模板，保证同一个 POI 每次显示相同描述
  const hash = name.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
  return templates[hash % templates.length];
}

    if (!AMAP_KEY) {

      setNearbySearchError('');
      setSearchingNearby(false);
      return [];

    console.log(`[searchNearby #${seq}] 开始搜索 lat=${lat}, lng=${lng}, radius=${radius}`);

  const addFriend = useCallback((userId) => {
    setFriends(prev => {
      if (prev.find(f => f.id === userId)) return prev;
      const user = nearbyUsers.find(u => u.id === userId);
      if (!user) return prev;
      return [...prev, { id: user.id, name: user.name, avatar: user.avatar, color: user.color }];
    });
  }, [nearbyUsers]);

  const removeFriend = useCallback((friendId) => {
    setFriends(prev => prev.filter(f => f.id !== friendId));
  }, []);

  const getFriends = useCallback(() => friends, [friends]);

  // 聊天消息
  const sendMessage = useCallback((friendId, text) => {
    if (!text.trim()) return;
    setMessages(prev => {
      const newMessages = { ...prev };
      if (!newMessages[friendId]) newMessages[friendId] = [];
      newMessages[friendId] = [
        ...newMessages[friendId],
        { id: uuid(), from: 'me', text: text.trim(), time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) },
      ];
      // 模拟对方自动回复
      setTimeout(() => {
        const autoReplies = [
          '好的，收到！',
          '哈哈，说得好！',
          '有道理~',
          '是的呢！',
          '👍',
          '到时候见！',
          '没问题！',
          '😊',
        ];
        setMessages(prev2 => {
          const nm = { ...prev2 };
          if (!nm[friendId]) nm[friendId] = [];
          nm[friendId] = [
            ...nm[friendId],
            { id: uuid(), from: friendId, text: autoReplies[Math.floor(Math.random() * autoReplies.length)], time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) },
          ];
          return nm;
        });
      }, 800 + Math.random() * 1500);
      return newMessages;
    });
  }, []);

  const getChatMessages = useCallback((friendId) => {
    return messages[friendId] || [];
  }, [messages]);

  // 添加新地点
  const [customPlaces, setCustomPlaces] = useState(() => {
    const saved = localStorage.getItem('nlqw_custom_places');
    return saved ? JSON.parse(saved) : [];
  });

  const addPlace = useCallback((newPlace) => {
    setCustomPlaces(prev => {
      const updated = [...prev, newPlace];
      localStorage.setItem('nlqw_custom_places', JSON.stringify(updated));
      return updated;
    });
  }, []);

  const allPlaces = useMemo(() => {
    // 如果有附近 POI，优先展示附近真实地点 + 自定义地点
    if (nearbyPois.length > 0) {
      return [...nearbyPois, ...customPlaces];
    }
    return [...places, ...customPlaces];
  }, [places, customPlaces, nearbyPois]);

  // 持久化附近 POI 和用户位置
  useEffect(() => {
    if (nearbyPois.length > 0) {
      localStorage.setItem('nlqw_nearby_pois', JSON.stringify(nearbyPois));
    }
  }, [nearbyPois]);

  useEffect(() => {
    if (userLocation) {
      localStorage.setItem('nlqw_user_location', JSON.stringify(userLocation));
    }
  }, [userLocation]);

  // 页面刷新后如果已选城市，需要恢复地点偏移并搜索真实地点
  useEffect(() => {
    if (selectedCity && selectedCity.lat != null && selectedCity.lng != null) {
      // 清除缓存的附近POI，准备重新搜索
      setNearbyPois([]);
      localStorage.removeItem('nlqw_nearby_pois');
      // 先偏移预置地点作为回退
      setPlaces(shiftPlacesToCity(MOCK_PLACES, selectedCity));
      // 异步搜索该城市的真实 POI
      searchNearby(selectedCity.lat, selectedCity.lng, 5000);
    }
  }, []); // 仅在组件挂载时执行一次

  return {
    currentPage, setCurrentPage,
    weather, setWeather, aqi, setAqi, hour,
    places: allPlaces, customPlaces, addPlace,
    posts, updatePost, addPost,
    playDates, updatePlayDate, addPlayDate, deletePlayDate,
    reviews, addReview, updateReview, deleteReview,
    favorites, toggleFavorite, isFavorite,
    postComments, addPostComment, deletePostComment,
    currentUser, updateCurrentUser,
    userLocation, setUserLocation,
    nearbyPois, searchNearby, searchingNearby, nearbySearchError,
    friends, addFriend, removeFriend, getFriends,
    messages, sendMessage, getChatMessages,
    nearbyUsers, refreshNearbyUsers,
    selectedCity, selectCity,
    supabaseReady,
    syncCurrentUserToSupabase,
  };
}

// 星星评分组件
function StarRating({ rating, interactive = false, onChange, size = 16, showNumber = false }) {
  const [hoverRating, setHoverRating] = useState(0);
  const [animatingStar, setAnimatingStar] = useState(0);

  const displayRating = hoverRating || rating;

  const handleClick = (val) => {
    if (interactive && onChange) {
      onChange(val);
      setAnimatingStar(val);
      setTimeout(() => setAnimatingStar(0), 400);
    }
  };

  return (
    <div className={`stars ${interactive ? 'interactive' : ''}`}>
      {[1,2,3,4,5].map(i => {
        const filled = i <= Math.floor(displayRating);
        const half = !filled && i - 0.5 <= displayRating;
        const anim = animatingStar && i <= animatingStar;
        return (
          <span
            key={i}
            className={`star-icon ${filled ? 'star-filled' : ''} ${half ? 'star-half' : ''} ${anim ? 'star-pop' : ''}`}
            style={{ fontSize: size + 'px' }}
            onClick={() => handleClick(i)}
            onMouseEnter={() => interactive && setHoverRating(i)}
            onMouseLeave={() => interactive && setHoverRating(0)}
          >
            <i className={`fa-star ${filled || half ? 'fa-solid' : 'fa-regular'}`}></i>
          </span>
        );
      })}
      {showNumber && (
        <span className="star-number" style={{ fontSize: size * 0.85 + 'px' }}>{rating.toFixed(1)}</span>
      )}
    </div>
  );
}

function HomePage() {

  const [scores, setScores] = useState([]);
  const [locating, setLocating] = useState(false);
  const [locError, setLocError] = useState('');
  const [showCityPicker, setShowCityPicker] = useState(false);

  // 计算两点距离（km）
  const calcDistance = (lat1, lng1, lat2, lng2) => {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    return +(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
  };

  useEffect(() => {
    const scored = places.map(p => {
      let distance = p.distance;
      // 如果用户已定位，计算真实距离
      if (userLocation && p.lat && p.lng) {
        distance = calcDistance(userLocation.lat, userLocation.lng, p.lat, p.lng);
      }
      return {
        ...p,
        distance,
        dynamicScore: calculateDynamicScore(p, weather, aqi, hour),
        reason: getRecommendReason(p, weather, aqi, hour),
      };
    });
    scored.sort((a, b) => b.dynamicScore - a.dynamicScore);
    setScores(scored.slice(0, 6));

  const handleLocateHome = () => {

      setLocError('浏览器不支持定位');

    setLocating(true);

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        // GPS 真实定位 → 清除城市模拟模式（直接清 selectedCity，不走 selectCity(null) 以免覆盖 userLocation）
        selectCity(null);
        // 设置全局用户位置（放在 selectCity 之后，确保不被 selectCity(null) 的内部逻辑清空）
        setUserLocation(loc);
        // 搜索附近的真实 POI
        searchNearby(pos.coords.latitude, pos.coords.longitude, 3000);
        setLocating(false);
      },
      (err) => {
        setLocating(false);
        setLocError('定位失败，请允许定位权限');
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
    );
  };

  // 热门评价（取最新的3条高评分评价）
  const hotReviews = useMemo(() => {
    return [...reviews].sort((a, b) => b.likes - a.likes).slice(0, 3);

  const getPlaceName = (placeId) => {
    const p = places.find(pl => pl.id === placeId);
    return p ? p.name : '未知地点';

  const handlePlayNow = (place) => {
    // 存储要发起约玩的地点并触发全局事件
    sessionStorage.setItem('nlqw_play_place', JSON.stringify(place));
    window.dispatchEvent(new CustomEvent('openPlayDate', { detail: place }));

          <h1 style={{ fontSize: 26, fontWeight: 800, background: 'linear-gradient(135deg, var(--accent-color), var(--star-color))', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>
            邻里探玩
          </h1>
          <div className="flex-center gap-8">
            <button
              className="btn btn-sm btn-outline"
              onClick={handleLocateHome}
              disabled={locating}
              title="定位并搜索附近真实地点"
            >
              <i className={`fa-solid ${locating ? 'fa-spinner fa-spin' : 'fa-location-crosshairs'}`}></i>
              {userLocation && !selectedCity ? '已定位' : '定位附近'}
            </button>
          </div>
        </div>
        <div className="flex-center gap-8 mt-8">
          <span className="text-sm text-muted">{formatDate(new Date())}</span>
          <span className="tag tag-blue">
            <i className={`fa-solid ${weather.icon}`}></i> {weather.label}
          </span>
          <span className="tag tag-green">
            AQI {aqi} {aqi < 50 ? '优' : aqi < 100 ? '良' : '轻度污染'}
          </span>
          {userLocation && (
            <span className="tag tag-purple">
              <i className="fa-solid fa-map-pin"></i> 附近真实地点
            </span>
          )}
        </div>
        {locError && (
          <p style={{ fontSize: 12, color: 'var(--danger-color)', marginTop: 4 }}>{locError}</p>
        )}
        {searchingNearby && (
          <div className="flex-center gap-8 mt-8" style={{ fontSize: 12, color: 'var(--accent-color)' }}>
            <i className="fa-solid fa-spinner fa-spin"></i>
            <span>正在搜索{selectedCity ? selectedCity.name + '周边' : '附近'}真实场所...</span>
          </div>

        {nearbySearchError && (

          {scores.length > 0 && scores[0].source === 'synthetic' && selectedCity && (

  );
}

// ==================== 城市选择弹窗（共享组件） ====================
function CityPickerModal({ show, onClose, selectedCity, onSelectCity }) {
  const [searchText, setSearchText] = useState('');
  const searchInputRef = useRef(null);

  // 打开时自动聚焦搜索框
  useEffect(() => {
    if (show && searchInputRef.current) {
      setTimeout(() => searchInputRef.current.focus(), 100);
    }
    if (!show) setSearchText('');
  }, [show]);

  const handleSelect = useCallback((city) => {
    onSelectCity(city);
    onClose();
  }, [onSelectCity, onClose]);

  const content = useMemo(() => {
    if (searchText.trim()) {
      const filtered = CITY_LIST.filter(c =>
        c.name.includes(searchText.trim()) || c.region.includes(searchText.trim())
      );
      if (filtered.length === 0) {
        return <div className="city-picker-empty"><i className="fa-solid fa-search"></i> 未找到匹配城市</div>;
      }
      return filtered.map(city => (
        <div key={city.name}
          className={`city-picker-item ${selectedCity?.name === city.name ? 'city-picker-item-active' : ''}`}
          onClick={() => handleSelect(city)}>
          <span className="city-picker-name">{city.name}</span>
          <span className="city-picker-region">{city.region}</span>
        </div>
      ));
    }

    // 热门城市
    var hotNameList = ['北京','上海','广州','深圳','杭州','成都','重庆','武汉','西安','南京','厦门','三亚'];
    var hotCities = [];
    for (var i = 0; i < hotNameList.length; i++) {
      var found = null;
      for (var j = 0; j < CITY_LIST.length; j++) {
        if (CITY_LIST[j].name === hotNameList[i]) { found = CITY_LIST[j]; break; }
      }
      if (found) hotCities.push(found);
    }

    var regions = [];
    var seen = {};
    for (var k = 0; k < CITY_LIST.length; k++) {
      if (!seen[CITY_LIST[k].region]) {
        seen[CITY_LIST[k].region] = true;
        regions.push(CITY_LIST[k].region);
      }
    }

    return (
      <React.Fragment>
        <div className="city-section-title"><i className="fa-solid fa-fire"></i> 热门城市</div>
        <div className="city-hot-grid">
          {hotCities.map(function(city) {
            return (
              <div key={city.name}
                className={'city-hot-chip' + (selectedCity?.name === city.name ? ' city-hot-chip-active' : '')}
                onClick={function() { handleSelect(city); }}>
                {city.name}
              </div>
            );
          })}
        </div>
        <div className="city-section-title"><i className="fa-solid fa-earth-asia"></i> 全部城市</div>
        {regions.map(function(region) {
          return (
            <div key={region}>
              <div className="city-region-title">{region}</div>
              {CITY_LIST.filter(function(c) { return c.region === region; }).map(function(city) {
                return (
                  <div key={city.name}
                    className={'city-picker-item' + (selectedCity?.name === city.name ? ' city-picker-item-active' : '')}
                    onClick={function() { handleSelect(city); }}>
                    <span className="city-picker-name">{city.name}</span>
                  </div>
                );
              })}
            </div>
          );
        })}
      </React.Fragment>
    );
  }, [searchText, selectedCity, handleSelect]);

  if (!show) return null;

  return (
    <div className="modal-overlay city-picker-overlay" onClick={onClose}>
      <div className="city-picker-modal" onClick={function(e) { e.stopPropagation(); }}>
        <div className="city-picker-header">
          <h3><i className="fa-solid fa-city"></i> 选择城市</h3>
          <button className="modal-close" onClick={onClose}>
            <i className="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div className="city-picker-search">
          <i className="fa-solid fa-search"></i>
          <input
            ref={searchInputRef}
            className="city-picker-input"
            type="text"
            placeholder="搜索城市名称..."
            value={searchText}
            onChange={function(e) { setSearchText(e.target.value); }}
          />
          {searchText && (
            <button className="search-clear-btn" onClick={function() { setSearchText(''); }}>
              <i className="fa-solid fa-xmark"></i>
            </button>
          )}
        </div>
        <div className="city-picker-body">
          {content}
        </div>
        <div className="city-picker-footer">
          <button
            className="btn btn-secondary"
            onClick={function() { onSelectCity(null); onClose(); }}>
            <i className="fa-solid fa-location-crosshairs"></i> 恢复 GPS 定位
          </button>
        </div>
      </div>
    </div>
  );
}

  const [navMode, setNavMode] = useState('walk'); // 'walk' | 'bike' | 'car'
  const navLineRef = useRef(null); // 导航路线图层引用

  const MAP_CENTER = useMemo(() => {

  // 同步全局用户位置到本地

  const filteredPlaces = useMemo(() => {

    if (searchKeyword.trim()) {

      result = result.filter(p =>
        p.name.toLowerCase().includes(kw) ||
        p.desc.toLowerCase().includes(kw) ||
        p.tags.some(t => t.toLowerCase().includes(kw)) ||
        (PLACE_CATEGORY_LABEL[p.category] || '').includes(kw)

    }

    // 分类筛选
    if (activeCategory !== 'all') {
      result = result.filter(p => p.category === activeCategory);
    }

    // 排序
    switch (sortBy) {
      case 'rating':
        result.sort((a, b) => b.rating - a.rating);
        break;
      case 'name':
        result.sort((a, b) => a.name.localeCompare(b.name, 'zh'));

      case 'distance':

        selectCity(null);
        setUserLocation(loc);
        setLocating(false);
        // 保存到全局状态（放在 selectCity(null) 之后，覆盖其内部的 setUserLocation(null)）
        setGlobalUserLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude });
        // 地图飞行到用户位置
        if (mapInstanceRef.current) {
          mapInstanceRef.current.flyTo(loc, 16, { duration: 1 });
        }
        // 自动搜索附近真实地点
        searchNearby(pos.coords.latitude, pos.coords.longitude, searchRadius);
      },
      (err) => {
        setLocating(false);
        switch (err.code) {
          case 1: setLocationError('请开启定位权限'); break;
          case 2: setLocationError('无法获取您的位置信息'); break;
          case 3: setLocationError('定位请求超时，请重试'); break;

    if (viewMode !== 'map' || !mapInstanceRef.current) return;
    const map = mapInstanceRef.current;

      userMarkerRef.current = null;

      const userIcon = L.divIcon({
        className: 'user-location-marker',

          <div class="user-location-pulse"></div>
          <div class="user-location-inner"></div>

        iconSize: [24, 24],
        iconAnchor: [12, 12],

      // 添加精度圈

        radius: 50,
        color: '#4A90D9',
        fillColor: '#4A90D9',
        fillOpacity: 0.15,

  // 同步 markMode 到 ref，确保地图事件中能获取最新值
  useEffect(() => {
    markModeRef.current = markMode;
    // 更新地图光标样式

  // 同步全局用户位置到 window（供 AddPlaceModal 计算距离）
  useEffect(() => {
    if (globalUserLocation) {

    if (type === 'satellite') {
      // 高德卫星图（含标注）

        subdomains: '1234',
        maxZoom: 18,
        minZoom: 3,
      });
    } else {
      // 高德标准地图
      newLayer = L.tileLayer('https://wprd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&style=7&x={x}&y={y}&z={z}', {
        subdomains: '1234',
        maxZoom: 18,
        minZoom: 3,

  // 应用内路径导航
  const handleNavigate = useCallback((placeLat, placeLng, placeName) => {
    // 获取用户位置作为起点
    const loc = globalUserLocation || (userLocation ? { lat: userLocation[0], lng: userLocation[1] } : null);
    if (!loc) {
      setLocationError('请先定位到当前位置，才能使用导航功能');

    setNavStart({ lat: loc.lat, lng: loc.lng, name: '我的位置' });
    setNavEnd({ lat: placeLat, lng: placeLng, name: placeName });
    setNavActive(true);
    // 飞行到能同时看到起点和终点的视野
    if (mapInstanceRef.current) {
      const bounds = L.latLngBounds(
        [loc.lat, loc.lng],

  // 退出导航
  const handleNavClose = useCallback(() => {

  // 导航路线计算
  // 计算两点间距离（Haversine公式，返回公里）
  const calcDistance = useCallback((lat1, lng1, lat2, lng2) => {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }, []);

  // 计算方位角（从起点看向终点的方向，0=北, 90=东）
  const calcBearing = useCallback((lat1, lng1, lat2, lng2) => {
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const lat1r = lat1 * Math.PI / 180;
    const lat2r = lat2 * Math.PI / 180;
    const y = Math.sin(dLng) * Math.cos(lat2r);
    const x = Math.cos(lat1r) * Math.sin(lat2r) - Math.sin(lat1r) * Math.cos(lat2r) * Math.cos(dLng);
    const bearing = Math.atan2(y, x) * 180 / Math.PI;
    return (bearing + 360) % 360;
  }, []);

  // 方位角转方向文字
  const bearingToDirection = useCallback((bearing) => {
    const dirs = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
    return dirs[Math.round(bearing / 45) % 8];
  }, []);

  // 方位角转方向图标（箭头旋转角度）
  const bearingToIconRotation = useCallback((bearing) => {
    return bearing; // 0=北(↑), 90=东(→)
  }, []);

  // 计算导航信息
  const navInfo = useMemo(() => {
    if (!navStart || !navEnd) return null;
    const dist = calcDistance(navStart.lat, navStart.lng, navEnd.lat, navEnd.lng);
    const bearing = calcBearing(navStart.lat, navStart.lng, navEnd.lat, navEnd.lng);
    const direction = bearingToDirection(bearing);
    // 速度：步行5km/h，骑行15km/h，驾车40km/h
    const speeds = { walk: 5, bike: 15, car: 40 };
    const speed = speeds[navMode] || 5;
    const timeMin = Math.round(dist / speed * 60);
    const timeStr = timeMin < 60 ? `${timeMin}分钟` : `${Math.floor(timeMin/60)}小时${timeMin%60}分钟`;
    return { dist, bearing, direction, timeMin, timeStr };
  }, [navStart, navEnd, navMode, calcDistance, calcBearing, bearingToDirection]);

  // 绘制导航路线
  useEffect(() => {

    const map = mapInstanceRef.current;

    if (navLineRef.current) {

    const line = L.polyline(

    };
  }, [navActive, navStart, navEnd]);

  // 创建自定义地图标记图标（带选中状态，支持用户自定义图标）
  const createMarkerIcon = useCallback((category, isSelected = false, customIcon = null) => {
    const color = PLACE_CATEGORY_COLOR[category] || '#666';
    const iconChar = customIcon || PLACE_CATEGORY_ICON[category] || 'fa-map-pin';
    const size = isSelected ? 48 : 38;
    const fontSize = isSelected ? 18 : 15;
    return L.divIcon({
      className: `custom-marker ${isSelected ? 'marker-selected' : ''}`,

        <i class="fa-solid ${iconChar}" style="font-size:${fontSize}px;"></i>

  }, []);

  // 初始化 Leaflet 地图
  useEffect(() => {
    if (viewMode !== 'map') return;
    if (!mapContainerRef.current) return;
    if (mapInstanceRef.current) return; // 已初始化

    const container = mapContainerRef.current;
    setMapReady(false);

    const map = L.map(container, {

      maxZoom: 18,

      zoomControl: false,
      attributionControl: false,
      tap: true,
      maxBoundsViscosity: 1.0,
    });

    // 添加地图瓦片

    const onFirstTile = () => {
      if (!tileLoaded) {
        tileLoaded = true;
        setMapReady(true);
      }
    };

    // 高德地图瓦片（中文标注，主图层）
    const layerUrl = tileLayer === 'satellite'
      ? 'https://wprd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&style=6&x={x}&y={y}&z={z}'
      : 'https://wprd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&style=7&x={x}&y={y}&z={z}';
    const gaodeLayer = L.tileLayer(layerUrl, {
      subdomains: '1234',
      maxZoom: 18,
      minZoom: 3,
    }).addTo(map);
    tileLayerRef.current = gaodeLayer;

    gaodeLayer.on('tileload', onFirstTile);
    gaodeLayer.on('tileerror', () => {

        setMapReady(true);

    });

    // 兜底：2 秒后还没加载出瓦片也标记 ready

      }

    // 缩放控件放在右下角

    map.on('click', (e) => {

        setShowMarkForm(true);
        setMarkMode(false);

        map.getContainer().style.cursor = '';
      }

    // 多次调用 invalidateSize 确保容器尺寸正确

  useEffect(() => {

    map.invalidateSize();

        <div class="map-popup" data-place-id="${place.id}">

          <div class="popup-meta">

            <span style="color:var(--nav-inactive);font-size:12px;"><i class="fa-solid fa-location-dot"></i> ${place.distance}km</span>
          </div>

          <div class="popup-actions">

            <button class="btn btn-sm btn-secondary popup-action-btn" data-action="navigate" data-place-lat="${place.lat}" data-place-lng="${place.lng}" data-place-name="${place.name.replace(/"/g, '&quot;')}">🧭 去这里</button>
            <button class="btn btn-sm btn-secondary popup-action-btn" data-action="detail" data-place-id="${place.id}">ℹ️ 详情</button>
          </div>
        </div>
      `;

      marker.bindPopup(popupHtml, {
        maxWidth: 270,
        className: 'map-popup-wrapper',

      marker.on('click', () => {
        // 先清除所有标记的选中状态
        layer.eachLayer(m => {
          const icon = m.getIcon();
          if (icon && icon.options.className) {
            m.setIcon(createMarkerIcon(m._placeCategory || 'park', false, m._customIcon));
          }
        });
        // 设置当前标记为选中
        marker.setIcon(createMarkerIcon(place.category, true, place.customIcon));
        // 存储分类信息以便重置
        marker._placeCategory = place.category;
        marker._customIcon = place.customIcon;
      });

      marker._placeCategory = place.category;
      marker._customIcon = place.customIcon;

      // 使用全局事件代理处理弹窗按钮点击
      marker.on('popupopen', (e) => {
        const popupEl = e.popup.getElement();
        if (!popupEl) return;

        const handlePopupClick = (ev) => {
          const btn = ev.target.closest('.popup-action-btn');
          if (!btn) return;

          ev.preventDefault();
          ev.stopPropagation();

          const action = btn.dataset.action;
          if (action === 'play') {
            setPlayPlace(place);
            setShowPlayDate(true);
            map.closePopup();
          } else if (action === 'navigate') {
            map.closePopup();
            handleNavigate(parseFloat(btn.dataset.placeLat), parseFloat(btn.dataset.placeLng), btn.dataset.placeName);
          } else if (action === 'detail') {
            map.closePopup();
            window.dispatchEvent(new CustomEvent('openPlaceDetail', { detail: place }));
          }
        };

        popupEl.addEventListener('click', handlePopupClick);
        // 清理
        marker._popupClickHandler = handlePopupClick;
      });

      marker.on('popupclose', () => {
        // 弹窗关闭时恢复标记大小
        marker.setIcon(createMarkerIcon(place.category, false, place.customIcon));
        if (marker._popupClickHandler) {
          // handler 随 popup 销毁自动失效
          marker._popupClickHandler = null;
        }
      });

      layer.addLayer(marker);
    });

    // 适配地图视野（延迟执行确保 invalidateSize 已生效）
    if (filteredPlaces.length > 0) {
      const bounds = filteredPlaces.map(p => [p.lat, p.lng]);
      setTimeout(() => {
        if (!mapInstanceRef.current) return;
        if (filteredPlaces.length === 1) {
          mapInstanceRef.current.setView(bounds[0], 16);
        } else {
          mapInstanceRef.current.fitBounds(bounds, { padding: [40, 40], maxZoom: 16 });
        }
      }, 100);
    }
  }, [filteredPlaces, viewMode, createMarkerIcon]);

  // 搜索关键词变化时刷新地图尺寸（搜索框输入可能改变布局）
  useEffect(() => {
    if (viewMode === 'map' && mapInstanceRef.current) {
      setTimeout(() => mapInstanceRef.current.invalidateSize(), 150);
    }
  }, [searchKeyword, showFilters]);

  // 当地图容器 ref 就绪时，如果地图实例已存在则刷新尺寸
  useEffect(() => {
    if (viewMode === 'map' && mapContainerRef.current && mapInstanceRef.current) {
      setTimeout(() => mapInstanceRef.current.invalidateSize(), 200);
    }
  }, [mapContainerRef.current, viewMode]);

  return (
    <div className="page-container page-enter map-page-layout" style={{ padding: 0 }}>
      {/* 头部 */}
      <div style={{ padding: '12px 16px 8px' }}>
        <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 12 }}>
          <i className="fa-solid fa-map-location-dot text-accent"></i> 探索周边
          {globalUserLocation && (
            <span className="tag tag-green" style={{ marginLeft: 8, fontSize: 11 }}>
              <i className="fa-solid fa-location-dot"></i>
              {' '}
              已定位 · {filteredPlaces.length} 个地点
            </span>
          )}
          {searchingNearby && (
            <span className="tag tag-orange" style={{ marginLeft: 8, fontSize: 11 }}>
              <i className="fa-solid fa-spinner fa-spin"></i> 搜索中...
            </span>
          )}
        </h2>

        {/* 搜索栏 */}
        <div className="search-bar-container">
          <div className="search-input-wrapper">
            <i className="fa-solid fa-magnifying-glass search-icon"></i>
            <input
              type="text"
              className="search-input"
              placeholder="搜索地点名称、标签、描述..."
              value={searchKeyword}
              onChange={(e) => setSearchKeyword(e.target.value)}
            />
            {searchKeyword && (
              <button className="search-clear-btn" onClick={() => setSearchKeyword('')}>
                <i className="fa-solid fa-xmark"></i>
              </button>
            )}
          </div>
          <button
            className={`btn btn-sm ${showFilters || activeCategory !== 'all' ? 'btn-primary' : 'btn-secondary'}`}
            style={{ borderRadius: 18, flexShrink: 0 }}
            onClick={() => setShowFilters(!showFilters)}
          >
            <i className="fa-solid fa-sliders"></i>
          </button>
        </div>


        {/* 分类筛选 & 排序（可折叠） */}
        {(showFilters || activeCategory !== 'all') && (
          <div className="filter-panel">
            <div className="filter-section">
              <span className="filter-label">分类：</span>
              <div className="filter-chips">
                {[
                  { key: 'all', label: '全部', icon: 'fa-globe', color: '#666' },
                  { key: 'sport', label: '运动场地', icon: 'fa-basketball', color: PLACE_CATEGORY_COLOR.sport },
                  { key: 'park', label: '公园绿地', icon: 'fa-tree', color: PLACE_CATEGORY_COLOR.park },
                  { key: 'indoor', label: '室内场所', icon: 'fa-building', color: PLACE_CATEGORY_COLOR.indoor },
                  { key: 'secret', label: '秘密基地', icon: 'fa-star', color: PLACE_CATEGORY_COLOR.secret },
                ].map(cat => (
                  <button
                    key={cat.key}
                    className={`filter-chip ${activeCategory === cat.key ? 'filter-chip-active' : ''}`}
                    style={activeCategory === cat.key ? { background: cat.color, color: '#FFF', borderColor: cat.color } : {}}
                    onClick={() => setActiveCategory(activeCategory === cat.key ? 'all' : cat.key)}
                  >
                    <i className={`fa-solid ${cat.icon}`}></i> {cat.label}
                  </button>
                ))}
              </div>
            </div>
            <div className="filter-section">
              <span className="filter-label">排序：</span>
              <div className="filter-chips">
                {[
                  { key: 'distance', label: '距离最近', icon: 'fa-location-dot' },
                  { key: 'rating', label: '评分最高', icon: 'fa-star' },
                  { key: 'name', label: '名称排序', icon: 'fa-arrow-down-a-z' },
                ].map(s => (
                  <button
                    key={s.key}
                    className={`filter-chip ${sortBy === s.key ? 'filter-chip-active' : ''}`}
                    onClick={() => setSortBy(s.key)}
                  >
                    <i className={`fa-solid ${s.icon}`}></i> {s.label}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* 视图切换 */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8 }}>
          <span style={{ fontSize: 13, color: 'var(--nav-inactive)' }}>
            {activeCategory !== 'all' ? PLACE_CATEGORY_LABEL[activeCategory] : '全部地点'} · {filteredPlaces.length} 个
          </span>
          <div style={{ display: 'flex', background: 'var(--secondary-bg)', borderRadius: 20, padding: 3 }}>
            <button
              className={`btn btn-sm ${viewMode === 'map' ? 'btn-primary' : 'btn-secondary'}`}
              style={{ borderRadius: 18 }}
              onClick={() => setViewMode('map')}
            >
              <i className="fa-solid fa-map"></i> 地图
            </button>
            <button
              className={`btn btn-sm ${viewMode === 'list' ? 'btn-primary' : 'btn-secondary'}`}
              style={{ borderRadius: 18 }}
              onClick={() => setViewMode('list')}
            >
              <i className="fa-solid fa-list"></i> 列表
            </button>
          </div>
        </div>
      </div>

      {viewMode === 'map' ? (
        /* Leaflet map */
        <div className="map-wrapper">
          <div ref={mapContainerRef} className="map-container" style={{ position: 'relative' }}></div>

          {/* 地图浮动控件 - 右上角 */}
          <div className="map-floating-controls">
            {/* 定位按钮 */}
            <button
              className={`map-ctrl-btn ${locating ? 'map-ctrl-active' : ''}`}
              onClick={handleLocate}
              title="定位到当前位置"
              disabled={locating}
            >
              <i className={`fa-solid ${locating ? 'fa-spinner fa-spin' : 'fa-location-crosshairs'}`}></i>
            </button>

            {/* 图层切换按钮 */}
            <button
              className={`map-ctrl-btn ${tileLayer === 'satellite' ? 'map-ctrl-active' : ''}`}
              onClick={() => switchTileLayer(tileLayer === 'normal' ? 'satellite' : 'normal')}
              title={tileLayer === 'normal' ? '切换到卫星地图' : '切换到标准地图'}
            >
              <i className={`fa-solid ${tileLayer === 'normal' ? 'fa-satellite' : 'fa-map'}`}></i>
            </button>

            {/* 搜索半径选择 */}
            <button
              className={`map-ctrl-btn ${showRadiusPicker ? 'map-ctrl-active' : ''}`}
              onClick={() => setShowRadiusPicker(!showRadiusPicker)}
              title="搜索周边范围"
            >
              <i className="fa-solid fa-bullseye"></i>
            </button>

            {/* 添加标记按钮 - 在地图上点击放置图标 */}
            <button
              className={`map-ctrl-btn ${markMode ? 'map-ctrl-active' : ''}`}
              onClick={() => {
                setMarkMode(!markMode);
                setShowRadiusPicker(false);
              }}
              title={markMode ? '取消标记模式' : '在地图上画标记（点击地图添加地点）'}
              style={markMode ? { background: 'var(--accent-color)', color: '#FFF', animation: 'pulse 1.5s ease-in-out infinite' } : {}}
            >
              <i className="fa-solid fa-thumbtack"></i>
            </button>
          </div>

          {/* 定位错误提示 */}
          {locationError && (
            <div className="map-toast" onClick={() => setLocationError('')}>
              <i className="fa-solid fa-triangle-exclamation"></i> {locationError}
            </div>
          )}

          {/* 搜索半径选择面板 */}
          {showRadiusPicker && (
            <div className="map-radius-panel">
              <div className="map-radius-title">
                <i className="fa-solid fa-bullseye"></i> 周边搜索范围
                <button className="map-radius-close" onClick={() => setShowRadiusPicker(false)}>
                  <i className="fa-solid fa-xmark"></i>
                </button>
              </div>
              <div className="map-radius-options">
                {[
                  { val: 500, label: '500米' },
                  { val: 1000, label: '1公里' },
                  { val: 2000, label: '2公里' },
                  { val: 5000, label: '5公里' },
                ].map(r => (
                  <button
                    key={r.val}
                    className={`map-radius-btn ${searchRadius === r.val ? 'map-radius-active' : ''}`}
                    onClick={() => {
                      setSearchRadius(r.val);
                      // 如果已定位，用新半径重新搜索
                      if (globalUserLocation) {
                        searchNearby(globalUserLocation.lat, globalUserLocation.lng, r.val);
                      } else if (userLocation) {
                        searchNearby(userLocation[0], userLocation[1], r.val);
                      }
                    }}
                  >
                    {r.label}
                  </button>
                ))}
              </div>
              {userLocation && (
                <p style={{ fontSize: 11, color: 'var(--nav-inactive)', margin: '8px 0 0', textAlign: 'center' }}>
                  以您当前位置为中心搜索 {searchRadius >= 1000 ? (searchRadius/1000).toFixed(1) + '公里' : searchRadius + '米'} 范围内的地点
                </p>
              )}
            </div>
          )}

          {filteredPlaces.length === 0 && (
            /* 无结果时显示提示浮层 */
            <div style={{
              position: 'absolute', top: 10, left: 10, right: 10, zIndex: 999,
              background: 'var(--card-bg)', borderRadius: 14, padding: '20px 16px',
              textAlign: 'center', boxShadow: '0 4px 20px rgba(0,0,0,0.12)',
            }}>
              <i className="fa-solid fa-magnifying-glass" style={{ fontSize: 40, color: 'var(--border-color)', marginBottom: 12, display: 'block' }}></i>
              <p style={{ color: 'var(--text-color)', fontSize: 14, fontWeight: 600, marginBottom: 4 }}>没有找到匹配的地点</p>
              <p style={{ color: 'var(--nav-inactive)', fontSize: 12, marginBottom: 12 }}>
                试试换个关键词或清除筛选条件
              </p>
              <button
                className="btn btn-secondary btn-sm"
                onClick={() => { setSearchKeyword(''); setActiveCategory('all'); }}
              >
                <i className="fa-solid fa-rotate-left"></i> 重置搜索
              </button>
            </div>
          )}
          {!mapReady && (
            <div style={{
              position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
              background: '#F0F0F0', display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center', zIndex: 10,
              borderRadius: 12,
            }}>
              <div className="spinner" style={{
                width: 36, height: 36, border: '3px solid #E0E0E0',
                borderTopColor: 'var(--accent-color)', borderRadius: '50%',
                animation: 'spin 0.8s linear infinite',
              }}></div>
              <span style={{ marginTop: 10, fontSize: 13, color: 'var(--nav-inactive)' }}>地图加载中...</span>
            </div>
          )}

          {/* 地图图例 */}
          <div className={`map-legend ${showLegend ? 'legend-visible' : ''}`}>
            <button className="legend-toggle" onClick={() => setShowLegend(!showLegend)} title="图例">
              <i className="fa-solid fa-list-ul"></i>
            </button>
            <div className="legend-panel">
              <div className="legend-title">地点图例</div>
              {Object.entries(PLACE_CATEGORY_LABEL).map(([key, label]) => (
                <div key={key} className="legend-item">
                  <span className="legend-dot" style={{ background: PLACE_CATEGORY_COLOR[key] }}>
                    <i className={`fa-solid ${PLACE_CATEGORY_ICON[key]}`}></i>
                  </span>
                  <span className="legend-label">{label}</span>
                </div>
              ))}
            </div>
          </div>

          {/* 应用内导航面板 */}
          {navActive && navStart && navEnd && navInfo && (
            <div className="nav-panel">
              <div className="nav-panel-header">
                <div className="nav-panel-title">
                  <i className="fa-solid fa-route"></i> 路线导航
                </div>
                <button className="nav-panel-close" onClick={handleNavClose}>
                  <i className="fa-solid fa-xmark"></i>
                </button>
              </div>

              {/* 交通模式选择 */}
              <div className="nav-mode-tabs">
                {[
                  { key: 'walk', icon: 'fa-person-walking', label: '步行' },
                  { key: 'bike', icon: 'fa-bicycle', label: '骑行' },
                  { key: 'car', icon: 'fa-car', label: '驾车' },
                ].map(m => (
                  <button
                    key={m.key}
                    className={`nav-mode-tab ${navMode === m.key ? 'nav-mode-active' : ''}`}
                    onClick={() => setNavMode(m.key)}
                  >
                    <i className={`fa-solid ${m.icon}`}></i>
                    <span>{m.label}</span>
                  </button>
                ))}
              </div>

              {/* 路线摘要 */}
              <div className="nav-summary">
                <div className="nav-summary-item">
                  <span className="nav-summary-icon" style={{ background: '#4A90D9' }}>
                    <i className="fa-solid fa-location-dot"></i>
                  </span>
                  <div>
                    <div className="nav-summary-label">起点</div>
                    <div className="nav-summary-name">{navStart.name}</div>
                  </div>
                </div>
                <div className="nav-summary-line"></div>
                <div className="nav-summary-item">
                  <span className="nav-summary-icon" style={{ background: '#E53935' }}>
                    <i className="fa-solid fa-flag-checkered"></i>
                  </span>
                  <div>
                    <div className="nav-summary-label">终点</div>
                    <div className="nav-summary-name">{navEnd.name}</div>
                  </div>
                </div>
              </div>

              {/* 关键导航信息 */}
              <div className="nav-info-cards">
                <div className="nav-info-card">
                  <div className="nav-info-value">{navInfo.dist.toFixed(2)}</div>
                  <div className="nav-info-unit">公里</div>
                  <div className="nav-info-label">直线距离</div>
                </div>
                <div className="nav-info-card nav-info-card-accent">
                  <div className="nav-info-value" style={{ display: 'flex', alignItems: 'center', gap: 6, justifyContent: 'center' }}>
                    <i className="fa-solid fa-location-arrow" style={{
                      transform: `rotate(${navInfo.bearing}deg)`,
                      fontSize: 20,
                    }}></i>
                    {navInfo.direction}
                  </div>
                  <div className="nav-info-unit">&nbsp;</div>
                  <div className="nav-info-label">前进方向</div>
                </div>
                <div className="nav-info-card">
                  <div className="nav-info-value">{navInfo.timeStr}</div>
                  <div className="nav-info-unit">{navMode === 'walk' ? '步行' : navMode === 'bike' ? '骑行' : '驾车'}</div>
                  <div className="nav-info-label">预估用时</div>
                </div>
              </div>

              {/* 路线指引 */}
              <div className="nav-guide">
                <div className="nav-guide-title">
                  <i className="fa-solid fa-list-check"></i> 路线指引
                </div>
                <div className="nav-guide-steps">
                  <div className="nav-guide-step">
                    <div className="nav-guide-step-num">1</div>
                    <div className="nav-guide-step-text">
                      从 <strong>{navStart.name}</strong> 出发，朝
                      <strong style={{ color: 'var(--accent-color)' }}> {navInfo.direction} </strong>
                      方向行进
                    </div>
                  </div>
                  <div className="nav-guide-step">
                    <div className="nav-guide-step-num">2</div>
                    <div className="nav-guide-step-text">
                      沿路线直行约 <strong>{navInfo.dist.toFixed(1)}公里</strong>
                    </div>
                  </div>
                  <div className="nav-guide-step">
                    <div className="nav-guide-step-num">3</div>
                    <div className="nav-guide-step-text">
                      到达目的地 <strong>{navEnd.name}</strong>
                      <span style={{ display: 'block', fontSize: 11, color: 'var(--nav-inactive)', marginTop: 2 }}>
                        <i className="fa-solid fa-clock"></i> 预计 {navInfo.timeStr} 到达
                      </span>
                    </div>
                  </div>
                </div>
              </div>

              {/* 底部提示 */}
              <div className="nav-footer-note">
                <i className="fa-solid fa-circle-info"></i>
                                                这是直线距离，实际走的话看地图上的蓝色虚线
              </div>
            </div>
          )}


        </div>
      ) : (
        /* 列表视图 */
        <div style={{ padding: '0 16px' }}>
          {filteredPlaces.length === 0 ? (
            <div style={{ padding: '40px 16px', textAlign: 'center' }}>
              <i className="fa-solid fa-magnifying-glass" style={{ fontSize: 48, color: 'var(--border-color)', marginBottom: 16, display: 'block' }}></i>
              <p style={{ color: 'var(--text-color)', fontSize: 14, fontWeight: 600, marginBottom: 4 }}>没有找到匹配的地点</p>
              <p style={{ color: 'var(--nav-inactive)', fontSize: 12, marginBottom: 12 }}>
                试试换个关键词或清除筛选条件
              </p>
              <button
                className="btn btn-secondary btn-sm"
                onClick={() => { setSearchKeyword(''); setActiveCategory('all'); }}
              >
                <i className="fa-solid fa-rotate-left"></i> 重置搜索
              </button>
            </div>
          ) : (
            filteredPlaces.map(place => (
              <div key={place.id} className="card" onClick={() => window.dispatchEvent(new CustomEvent('openPlaceDetail', { detail: place }))}>
                <div style={{ display: 'flex', gap: 12 }}>
                  <div className="img-placeholder" style={{
                    width: 60, height: 60, flexShrink: 0,
                    background: PLACE_CATEGORY_GRAD[place.category],
                    borderRadius: 12,
                  }}>
                    <i className={`fa-solid ${PLACE_CATEGORY_ICON[place.category]}`} style={{ fontSize: 22 }}></i>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div className="flex-between">
                      <h3 style={{ fontSize: 15, fontWeight: 700 }}>{place.name}</h3>
                      <span style={{ fontSize: 12, color: 'var(--nav-inactive)' }}>
                        <i className="fa-solid fa-location-dot"></i> {place.distance}km
                      </span>
                    </div>
                    <StarRating rating={place.rating} size={12} />
                    {place.address && (
                      <p style={{ fontSize: 11, color: 'var(--nav-inactive)', marginTop: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        <i className="fa-solid fa-map-pin"></i> {place.address}
                      </p>
                    )}
                    <div className="flex-center gap-4 mt-8">
                      {place.tags.map(t => <span key={t} className="tag tag-blue">{t}</span>)}
                    </div>
                  </div>
                </div>
              </div>
            ))
          )}
        </div>
      )}

      {/* 地点详情弹窗 */}
      {selectedPlace && (
        <div className="modal-overlay" onClick={() => setSelectedPlace(null)}>
          <div className="modal-content" onClick={e => e.stopPropagation()} style={{ animation: 'slideUp 0.3s ease-out' }}>
            <div className="modal-header">
              <h3>{selectedPlace.name}</h3>
              <button className="modal-close" onClick={() => setSelectedPlace(null)}>✕</button>
            </div>
            <div className="img-placeholder" style={{
              height: 160, marginBottom: 16,
              background: PLACE_CATEGORY_GRAD[selectedPlace.category],
            }}>
              <div style={{ textAlign: 'center' }}>
                <i className={`fa-solid ${PLACE_CATEGORY_ICON[selectedPlace.category]}`} style={{ fontSize: 48, display: 'block', marginBottom: 8 }}></i>
                <span>{PLACE_CATEGORY_LABEL[selectedPlace.category]}</span>
              </div>
            </div>
            <div className="flex-between mb-12">
              <div className="flex-center gap-8">
                <StarRating rating={selectedPlace.rating} size={16} />
                <span className="font-bold">{selectedPlace.rating}</span>
              </div>
              <span className="text-sm text-muted">
                <i className="fa-solid fa-location-dot"></i> {selectedPlace.distance}km
              </span>
            </div>
            <div className="flex-center gap-4 mb-12">
              {selectedPlace.tags.map(t => <span key={t} className="tag tag-blue">{t}</span>)}
            </div>
            <p style={{ fontSize: 14, lineHeight: 1.6, color: 'var(--nav-inactive)', marginBottom: 16 }}>
              {selectedPlace.desc}
            </p>
            <div style={{ display: 'flex', gap: 10 }}>
              <button
                className="btn btn-secondary btn-block"
                onClick={() => {
                  const place = selectedPlace;
                  setSelectedPlace(null);
                  window.dispatchEvent(new CustomEvent('openPlaceDetail', { detail: place }));
                }}
              >
                <i className="fa-solid fa-circle-info"></i> 查看详情
              </button>
              <button
                className="btn btn-primary btn-block"
                onClick={() => {
                  setPlayPlace(selectedPlace);
                  setShowPlayDate(true);
                  setSelectedPlace(null);
                }}
              >
                <i className="fa-solid fa-paper-plane"></i> 一键约玩
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 约玩弹窗 */}
      {showPlayDate && playPlace && (
        <PlayDateModal place={playPlace} onClose={() => { setShowPlayDate(false); setPlayPlace(null); }} />
      )}

      {/* 添加新地点弹窗 */}
      {showAddForm && (
        <AddPlaceModal onClose={() => setShowAddForm(false)} onAdd={addPlace} userLocation={globalUserLocation} />
      )}

      {/* 地图点击标记弹窗 */}
      {showMarkForm && markPosition && (
        <AddPlaceModal
          onClose={() => { setShowMarkForm(false); setMarkPosition(null); }}
          onAdd={(place) => {
            addPlace(place);
            setShowMarkForm(false);
            setMarkPosition(null);
          }}
          prefillPosition={markPosition}
        />
      )}

      {/* 标记模式提示 */}
      {markMode && (
        <div style={{
          position: 'absolute', top: 80, left: '50%', transform: 'translateX(-50%)',
          zIndex: 999, background: 'var(--accent-color)', color: '#FFF',
          padding: '10px 20px', borderRadius: 24, fontSize: 14, fontWeight: 600,
          boxShadow: '0 4px 16px rgba(0,0,0,0.2)', pointerEvents: 'none',
          animation: 'fadeIn 0.3s ease-out',
        }}>
          <i className="fa-solid fa-thumbtack"></i> 点击地图任意位置放置标记
        </div>
      )}

    </div>
  );
}

// ==================== 组件：添加新地点 ====================

function AddPlaceModal({ onClose, onAdd, prefillPosition, userLocation }) {
  const [form, setForm] = useState({
    name: '',
    category: 'park',
    desc: '',
    tags: '',
    customIcon: prefillPosition ? 'fa-thumbtack' : '', // 地图标记模式下默认图钉
  });

  const handleSubmit = () => {
    if (!form.name.trim()) return;
    // 使用地图点击位置 > 用户位置 > fallback
    let lat, lng;
    if (prefillPosition) {
      lat = prefillPosition.lat;
      lng = prefillPosition.lng;
    } else if (userLocation) {
      const angle = Math.random() * Math.PI * 2;
      const offsetKm = (Math.random() * 2 + 0.2) / 111.32;
      lat = +(userLocation.lat + offsetKm * Math.cos(angle)).toFixed(5);
      lng = +(userLocation.lng + offsetKm * Math.sin(angle)).toFixed(5);
    } else {
      lat = 30.28 + Math.random() * 0.02;
      lng = 120.14 + Math.random() * 0.02;
    }
    // 计算距离（如果有用户位置）
    let distance = +(Math.random() * 2 + 0.3).toFixed(1);
    if (prefillPosition && window._globalUserLocation) {
      const u = window._globalUserLocation;
      const R = 6371;
      const dLat = (lat - u.lat) * Math.PI / 180;
      const dLng = (lng - u.lng) * Math.PI / 180;
      const a = Math.sin(dLat/2) ** 2 + Math.cos(u.lat * Math.PI / 180) * Math.cos(lat * Math.PI / 180) * Math.sin(dLng/2) ** 2;
      distance = +(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
    }
    const newPlace = {
      id: 'custom_' + uuid(),
      name: form.name,
      category: form.category,
      type: form.category === 'sport' ? 'sport' : form.category,
      rating: 4.0,
      distance,
      tags: form.tags.split(',').map(t => t.trim()).filter(Boolean),
      desc: form.desc || '用户添加的新地点',
      lat, lng,
      customIcon: form.customIcon || null, // 自定义标记图标
    };
    onAdd(newPlace);
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h3>
            <i className={`fa-solid ${prefillPosition ? 'fa-thumbtack' : 'fa-plus-circle'}`}></i>
            {prefillPosition ? '在地图上放置标记' : '添加新地点'}
          </h3>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        {prefillPosition && (
          <div style={{ marginBottom: 12, fontSize: 12, color: 'var(--nav-inactive)', background: 'var(--secondary-bg)', padding: '8px 12px', borderRadius: 8 }}>
            <i className="fa-solid fa-map-pin"></i> 已选择位置：{prefillPosition.lat.toFixed(6)}, {prefillPosition.lng.toFixed(6)}
          </div>
        )}

        <div className="form-group">
          <label className="form-label">地点名称 *</label>
          <input className="form-input" value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="给地点起个名字" />
        </div>
        <div className="form-group">
          <label className="form-label">分类</label>
          <select className="form-select" value={form.category} onChange={e => setForm({...form, category: e.target.value})}>
            {Object.entries(PLACE_CATEGORY_LABEL).map(([k, v]) => (
              <option key={k} value={k}>{v}</option>
            ))}
          </select>
        </div>

        {/* 图标选择器 */}
        <div className="form-group">
          <label className="form-label">
            <i className="fa-solid fa-icons"></i> 标记图标
            {form.customIcon && <span style={{ marginLeft: 6, fontSize: 11, color: 'var(--accent-color)' }}>(已选择)</span>}
          </label>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 6 }}>
            {MARKER_ICON_OPTIONS.map(opt => (
              <div
                key={opt.icon}
                onClick={() => setForm({...form, customIcon: form.customIcon === opt.icon ? '' : opt.icon})}
                title={opt.label}
                style={{
                  width: 36, height: 36, borderRadius: '50%',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  cursor: 'pointer', transition: 'all 0.2s',
                  background: form.customIcon === opt.icon ? opt.color : 'var(--secondary-bg)',
                  color: form.customIcon === opt.icon ? '#FFF' : opt.color,
                  border: form.customIcon === opt.icon ? `2px solid ${opt.color}` : '2px solid transparent',
                  transform: form.customIcon === opt.icon ? 'scale(1.15)' : 'scale(1)',
                  boxShadow: form.customIcon === opt.icon ? `0 2px 8px ${opt.color}60` : 'none',
                }}
              >
                <i className={`fa-solid ${opt.icon}`} style={{ fontSize: 14 }}></i>
              </div>
            ))}
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">描述</label>
          <textarea className="form-textarea" value={form.desc} onChange={e => setForm({...form, desc: e.target.value})} placeholder="简单描述一下这个地方..." />
        </div>
        <div className="form-group">
          <label className="form-label">标签（用逗号分隔）</label>
          <input className="form-input" value={form.tags} onChange={e => setForm({...form, tags: e.target.value})} placeholder="如：安静、好玩、适合小朋友" />
        </div>
        <div className="img-placeholder" style={{ height: 120, marginBottom: 16, background: PLACE_CATEGORY_GRAD[form.category] }}>
          {form.customIcon ? (
            <i className={`fa-solid ${form.customIcon}`} style={{ fontSize: 36, marginBottom: 8 }}></i>
          ) : (
            <i className="fa-solid fa-camera"></i>
          )}
          <span style={{ marginTop: 4, fontSize: 12 }}>
            {form.customIcon ? '自定义图标已设置' : '暂为占位'}
          </span>
        </div>
        <button className="btn btn-primary btn-block" onClick={handleSubmit}>
          <i className="fa-solid fa-check"></i> 确认添加
        </button>
      </div>
    </div>
  );
}

// 约玩弹窗
function PlayDateModal({ place, onClose, onSuccess }) {
  const { addPlayDate, currentUser } = useApp();
  const [timeOption, setTimeOption] = useState('now');
  const [customTime, setCustomTime] = useState('');
  const [maxPeople, setMaxPeople] = useState(10);
  const [activity, setActivity] = useState('');

  const getTime = () => {
    if (timeOption === 'now') return '现在';
    if (timeOption === '30min') return '30分钟后';
    return customTime || '自定义时间';
  };

  const handleSubmit = () => {
    const newPlay = {
      id: 'play_' + uuid(),
      placeId: place.id,
      placeName: place.name,
      creatorId: currentUser.id,
      creatorName: currentUser.name,
      time: getTime(),
      maxPeople: maxPeople,
      currentPeople: 1,
      activity: activity || `一起去${place.name}玩！`,
      status: 'recruiting',
      participants: [currentUser.id],
    };
    addPlayDate(newPlay);
    onClose();
    if (onSuccess) onSuccess('约玩发布成功！快去看看谁要来～', 'fa-circle-check');
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e => e.stopPropagation()}>

          <h3><i className="fa-solid fa-paper-plane"></i> 发起约玩</h3>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="form-group">
          <label className="form-label">约玩地点</label>
          <input className="form-input" value={place.name} readOnly style={{ fontWeight: 600, color: 'var(--accent-color)' }} />
        </div>
        <div className="form-group">
          <label className="form-label">时间选择</label>
          <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
            {[
              { key: 'now', label: '现在' },
              { key: '30min', label: '30分钟后' },
              { key: 'custom', label: '自定义' },
            ].map(opt => (
              <button
                key={opt.key}

              >
                {opt.label}

            ))}

            <input className="form-input" type="datetime-local" value={customTime} onChange={e => setCustomTime(e.target.value)} />

          <label className="form-label">人数上限（2-20人）</label>
